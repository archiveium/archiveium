# For more information: https://laravel.com/docs/sail
version: '2.2'

services:
    archiveium:
        container_name: archiveium
        build:
            context: ./docker/dev
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.1/app
        mem_limit: 2048M
        mem_reservation: 1024M
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - db
    db:
        container_name: db
        image: 'postgres:13'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'db:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
            retries: 3
            timeout: 5s
    meilisearch:
        container_name: meilisearch
        image: 'getmeili/meilisearch:v0.27.2'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        volumes:
            - 'meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--spider",  "http://localhost:7700/health"]
            retries: 3
            timeout: 5s
    mailhog:
        image: 'jcalonso/mailhog:v1.0.1'
        container_name: mailhog
        ports:
            - '${FORWARD_MAILHOG_PORT:-1025}:1025'
            - '${FORWARD_MAILHOG_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    minio:
      image: 'minio/minio:RELEASE.2022-09-25T15-44-53Z'
      ports:
        - '${FORWARD_MINIO_PORT:-9000}:9000'
        - '${FORWARD_MINIO_CONSOLE_PORT:-8900}:8900'
      environment:
        MINIO_ROOT_USER: '$MINIO_USER'
        MINIO_ROOT_PASSWORD: '$MINIO_PASSWORD'
        MINIO_COMPRESSION_ENABLE: 'on'
        MINIO_COMPRESSION_EXTENSIONS: ''
        MINIO_COMPRESSION_MIME_TYPES: ''
      volumes:
        - 'minio:/data/minio'
      networks:
        - sail
      entrypoint: sh
      command: -c 'mkdir -p /data/minio/emails && minio server /data/minio --console-address :8900'
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
        retries: 3
        timeout: 5s

networks:
    sail:
        driver: bridge

volumes:
    minio:
    db:
    meilisearch:
